name: CI/CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    outputs:
      can_trigger: ${{ steps.check.outputs.can_trigger }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck
        continue-on-error: false

      - name: ESLint
        run: npm run lint || true

      - name: Unit tests
        run: npm test
        continue-on-error: false

      - id: check
        run: echo "can_trigger=true" >> $GITHUB_OUTPUT

  trigger-agent:
    name: Trigger Supervisor
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    concurrency:
      group: supervisor
      cancel-in-progress: false

    steps:
      - name: Trigger Supervisor workflow
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'supervisor.yml',
                ref: 'develop',
                inputs: {
                  trigger: 'push',
                  commit: context.sha
                }
              });
              console.log('✓ Supervisor workflow triggered');
            } catch (e) {
              console.log('⚠ Could not trigger supervisor:', e.message);
            }
